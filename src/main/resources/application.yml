spring:
  application:
    name: ipl-player-analysis-backend
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: 1800000

server:
  port: ${PORT:8080}

grok:
  api:
    key: ${GROK_API_KEY}
    url: https://api.x.ai/v1/chat/completions
    model: grok-beta

cricapi:
  api:
    key: ${CRICAPI_KEY}
    url: https://api.cricketdata.org/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}
