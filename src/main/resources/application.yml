spring:
  application:
    name: ipl-player-analysis-backend
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: 1800000

server:
  port: ${PORT:8080}

grok:
  api:
    key: ${GROK_API_KEY:changeme}
    url: https://api.x.ai/v1/chat/completions
    model: grok-3

cricapi:
  api:
    key: ${CRICAPI_KEY:changeme}
    base-url: https://api.cricapi.com/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:fallbacksecretfordevonlymustbe256bitslong12345}
  expiration: 86400000

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}
