services:
  - type: web
    name: ipl-player-analysis-backend
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ipl-redis
          property: connectionString
      - key: GROK_API_KEY
        sync: false
      - key: CRICAPI_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: redis
    name: ipl-redis
    plan: free
    ipAllowList: []

databases:
  - name: ipl-db
    plan: free
